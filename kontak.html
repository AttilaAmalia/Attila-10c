  <!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kontak</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #f5f7fa, #e4ecf7);
}

.contact-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

.contact-box {
    background: white;
    width: 100%;
    max-width: 600px;
    padding: 50px 40px;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.08);
}

.contact-box h1 {
    text-align: center;
    margin-bottom: 40px;
    font-weight: 600;
}

.form-group {
    margin-bottom: 20px;
}

input, textarea {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid #ddd;
    font-size: 15px;
    transition: 0.3s;
}

input:focus, textarea:focus {
    border-color: #4a90e2;
    outline: none;
}

button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 50px;
    background: #4a90e2;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #357abd;
}
</style>
</head>
