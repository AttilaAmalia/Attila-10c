<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kontak</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: linear-gradient(to bottom, #e6f4ea, #f4fbf6);
}

/* JUDUL */
.judul {
    text-align: center;
    background: #b7e4c7;
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
    color: #2d6a4f;

/* CONTAINER */
.container {
    width: 80%;
    margin: 30px auto;
}

/* BOX ALAMAT (TRANSPARAN) */
.alamat {
    background: rgba(255,255,255,0.5); /* transparan */
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 30px;
}

/* BOX FORM (LEBIH BESAR) */
.form {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 100%;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* TEXT */
h2 {
    color: #2d6a4f;
}

p {
    color: #444;
}

/* INPUT */
input, textarea {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: #40916c;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #2d6a4f;
}
</style>

</head>

<body>

<div class="judul">Kontak & Alamat Toko</div>

<div class="container">

    <!-- ALAMAT TOKO (ATAS & TRANSPARAN) -->
    <div class="alamat">
        <h2>📍 Alamat Toko</h2>
        <p><b>Usaha Buku Attila Amalia</b></p>
        <p>Jl. Melati No. 10, Surabaya</p>
        <p>📞 0812-3456-7890</p>
        <p>📧 attilaamalia@gmail.com</p>
    </div>

    <!-- FORM (BAWAH & LEBIH BESAR) -->
    <div class="form">
        <h2>✉️ Hubungi Kami</h2>
        <form>
            <input type="text" placeholder="Nama" required>
            <input type="email" placeholder="Email" required>
            <textarea rows="5" placeholder="Pesan" required></textarea>
            <button type="submit">Kirim</button>
        </form>
    </div>

</div>

</body>
</html>
